<section class="focus">
    <div class="inner">
        <h2>Focus</h2>
        <div class="breakline"></div>

        <div class="focusItems">
            <div *ngFor="let item of focusItems" class="focusItem">
                <div class="imageWrapper">
                    <img [src]="item.img" [alt]="item.title" />
                </div>
                <div class="content">
                    <h3>{{ item.title }}</h3>
                    <p>{{ item.desc }}</p>
                </div>
            </div>
        </div>
    </div>
</section>
